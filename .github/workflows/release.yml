name: Release

# Per the app-release-conventions: tag-driven, one build job per target OS, each
# attaching its self-contained artifact to the tagged release. macOS publishes a
# signed .app (assembled by the AssembleMacAppBundle target in Directory.Build.targets);
# Windows and Linux publish the loose self-contained folder. fail-fast is off so a
# secondary/best-effort platform failure never cancels the primary macOS build.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rid: osx-arm64
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Publish
        run: dotnet publish src/DayNote/DayNote.csproj -c Release -r ${{ matrix.rid }} --self-contained -o publish
      - name: Package
        shell: bash
        run: tar -C publish -czf "${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz" .
      - if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: "*.tar.gz"
          prerelease: ${{ contains(github.ref_name, '-') }}
